robotnik_charge:

  rate:
    type: int
    default_value: 10
    read_only: true
    description: "Frequency to run the action. default: 10"
    validation:
      gt<>: 0

  charge_timeout:
    type: int
    default_value: 60
    read_only: true
    description: "Seconds of timeout that the charging method must last. default: 60"
    validation:
      gt<>: 0

  dock_action:
    type: string
    default_value: "/smooth_drive/dock"
    description: "Name of dock action. default: /smooth_drive/dock"

  move_action:
    type: string
    default_value: "/move"
    description: "Name of move action. default: /move"

  has_safety_lasers:
    type: bool
    default_value: false
    description: "If the robot has safety lasers, the safety mode must change. default: false"

  max_velocity_x:
    type: double
    default_value: 1.0
    description: "Maximum velocity in x axis. default: 1.0"
    validation:
      gt<>: 0

  max_velocity_y:
    type: double
    default_value: 0.0
    description: "Maximum velocity in y axis. default: 0.0"
    validation:
      gt_eq<>: 0

  max_velocity_yaw:
    type: double
    default_value: 1.0
    description: "Maximum velocity in yaw. default: 1.0"
    validation:
      gt<>: 0

  