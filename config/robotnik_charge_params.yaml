robot:
  robotnik_charge:
    ros__parameters:

      rate: 10
      charge_action_timeout: 60.0
      timeout_charging_detection: 5
      dock_action: "accurate_smooth_dock/dock"
      move_action: "move"
      charge_contact_distance_from_marker: 0.105
      has_safety_lasers: false
      laser_mode_during_action: "docking"
      laser_mode_after_action: "standard"
      step_back_distance: 0.5
      rotation: 0.0
      max_velocity_x: 0.1
      max_velocity_y: 0.1 
      max_velocity_yaw: 0.1

      # marker
      # offset X
      # predock_offset
      # final_approach_vel_x:
      # timeout_charging_detection: el tiempo que tarda en esperar a que la docking diga que está cargando
      # timeout robot_moving: tbd
      # str: stop_condition: position, (magnetic_field, motor_current), ...


  